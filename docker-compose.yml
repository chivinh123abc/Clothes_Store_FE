version: '3.8'

services:
  rinstore-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rinstore-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - rinstore-network

networks:
  rinstore-network:
    driver: bridge
